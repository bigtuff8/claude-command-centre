<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Centre</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Toast Container -->
<div id="toastContainer" class="toast-container"></div>

<!-- Command Palette Overlay -->
<div class="cmd-overlay" id="cmdOverlay">
  <div class="cmd-palette">
    <div class="cmd-input-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input class="cmd-input" id="cmdInput" placeholder="Search sessions, run commands..." autocomplete="off">
      <kbd class="kbd-sm">ESC</kbd>
    </div>
    <div class="cmd-results" id="cmdResults"></div>
    <div class="cmd-footer">
      <span><kbd class="kbd-sm">&#8593;&#8595;</kbd> navigate</span>
      <span><kbd class="kbd-sm">Enter</kbd> select</span>
      <span><kbd class="kbd-sm">Esc</kbd> close</span>
    </div>
  </div>
</div>

<!-- New Session Modal (B002 redesign) -->
<div class="modal-overlay" id="newSessionModal">
  <div class="modal">
    <div class="modal-header">
      <h3>New Session</h3>
      <button class="modal-close" onclick="closeNewSession()">&times;</button>
    </div>
    <div class="modal-body">
      <button class="launch-option launch-primary" onclick="launchViaLauncher()">
        <span class="launch-icon">&#128640;</span>
        <div class="launch-text">
          <div class="launch-title">Open Launcher</div>
          <div class="launch-desc">Full project selection, MCP servers, harness, and standards sync</div>
          <div class="launch-hint">Opens in a new terminal window</div>
        </div>
      </button>

      <div class="launch-divider"><span>or</span></div>

      <button class="launch-option launch-secondary" onclick="toggleQuickLaunch()">
        <span class="launch-icon">&#9000;</span>
        <div class="launch-text">
          <div class="launch-title">Quick Session <span class="launch-tag">dashboard-managed</span></div>
          <div class="launch-desc">Fast, lightweight — no harness or MCP. Type directly from the dashboard.</div>
        </div>
      </button>

      <div class="quick-launch-options" id="quickLaunchOptions" style="display:none">
        <div class="form-group">
          <label>Project Directory</label>
          <input type="text" class="form-input" id="newProjectDir" placeholder="e.g., Work/ITSM/auth-service/" list="projectList">
          <datalist id="projectList">
            <option value="Work/ITSM/auth-service/">
            <option value="Work/Zendesk Integration/OOH Dashboard/">
            <option value="Work/IOT Admin/">
            <option value="Personal/family-hub/">
          </datalist>
        </div>
        <div class="form-group">
          <label>Session Name <span class="form-hint">(optional)</span></label>
          <input type="text" class="form-input" id="newSessionName" placeholder="e.g., Auth Refactor">
        </div>
        <div class="form-group">
          <label>Permission Mode</label>
          <select class="form-input" id="newPermMode">
            <option value="default">Default (prompt for each tool)</option>
            <option value="acceptEdits">Accept Edits</option>
            <option value="bypassPermissions">Bypass Permissions</option>
          </select>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="launchSession()">Start Session</button>
      </div>
    </div>
  </div>
</div>

<!-- Kill Confirmation Modal (B005) -->
<div class="modal-overlay" id="killModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h3>Stop Session?</h3>
      <button class="modal-close" onclick="closeKillModal()">&times;</button>
    </div>
    <div class="modal-body">
      <p id="killModalText">This will terminate the session. Any in-progress work will be lost.</p>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeKillModal()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmKill()">Stop Session</button>
    </div>
  </div>
</div>

<!-- Top Metrics Bar -->
<div class="metrics-bar">
  <div class="logo"><span class="logo-dot">&#9679;</span> Command Centre</div>
  <div class="metrics-group">
    <div class="metric">
      <div class="metric-value green" id="metricActive">4</div>
      <div class="metric-label">Active</div>
    </div>
    <div class="metric">
      <div class="metric-value amber" id="metricAttention">1</div>
      <div class="metric-label">Attention</div>
    </div>
    <div class="metric">
      <div class="metric-value blue" id="metricTokens">127.4k</div>
      <div class="metric-label">Tokens</div>
    </div>
    <div class="metric">
      <div class="metric-value" id="metricCost">$2.18</div>
      <div class="metric-label">Cost</div>
    </div>
  </div>
  <div class="top-actions">
    <button class="btn" onclick="openCommandPalette()"><kbd class="kbd">Ctrl K</kbd> Command</button>
    <button class="btn btn-primary" onclick="openNewSession()">+ New Session</button>
  </div>
</div>

<!-- Main Layout -->
<div class="main">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>Sessions</h3>
      <button class="sidebar-collapse-btn" onclick="toggleSidebar()" title="Collapse sidebar">&#9664;</button>
    </div>
    <div class="session-list" id="sessionList"></div>
  </div>
  <div class="resize-handle-vertical" id="sidebarResizeHandle"></div>
  <button class="sidebar-expand-btn" id="sidebarExpand" onclick="toggleSidebar()">&#9654;</button>

  <!-- Content -->
  <div class="content">
    <div class="content-header">
      <div class="content-title-area">
        <div class="content-title" id="contentTitle">All Sessions</div>
        <button class="btn btn-back" id="btnBack" onclick="clearSelection()" style="display:none">&#8592; All Sessions</button>
      </div>
      <div class="content-actions">
        <div class="view-toggle">
          <button class="active" onclick="setView('grid', this)">Grid</button>
          <button onclick="setView('list', this)">List</button>
        </div>
      </div>
    </div>

    <!-- Permission Bars -->
    <div id="permissionBars"></div>

    <!-- Session Grid/List -->
    <div class="grid-view" id="sessionGrid"></div>

    <!-- Activity Feed -->
    <div class="resize-handle-horizontal" id="feedResizeHandle"></div>
    <div class="activity-feed" id="activityFeed">
      <div class="feed-header" onclick="toggleFeed()">
        <span>Activity Feed</span>
        <span class="feed-toggle" id="feedToggle">&#9660;</span>
      </div>
      <div class="feed-body" id="feedBody"></div>
    </div>
  </div>
</div>

<!-- Mobile Tab Bar (B008) -->
<div class="mobile-tabs">
  <button class="mobile-tab active"><span class="mobile-tab-icon">&#9638;</span>Sessions</button>
  <button class="mobile-tab"><span class="mobile-tab-icon">&#9776;</span>Activity</button>
  <button class="mobile-tab"><span class="mobile-tab-icon">&#9881;</span>Settings</button>
</div>

<script src="app.js"></script>
</body>
</html>
